<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artisan — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .artisan-cover {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: var(--indigo);
    }
    .artisan-cover-placeholder {
      width: 100%;
      height: 320px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--mud) 100%);
    }
    .artisan-profile-section {
      background: white;
      border-bottom: 1px solid var(--bone-dark);
    }
    .artisan-profile-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .artisan-avatar-wrap {
      flex-shrink: 0;
      margin-top: -48px;
    }
    .artisan-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 4px solid white;
      background: var(--bone-dark);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .artisan-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .artisan-info { padding-top: 1rem; flex: 1; }
    .artisan-info h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    .artisan-info .tribe-region { color: var(--mud); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .artisan-tradition {
      display: inline-block;
      background: var(--indigo);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }
    .artisan-story {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--ink-light);
      max-width: 700px;
    }
    .years-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bone);
      border: 1px solid var(--bone-dark);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--bronze);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <main>
    <div id="artisan-cover"></div>
    <section class="artisan-profile-section">
      <div class="artisan-profile-inner" id="artisan-profile">
        <div class="skeleton" style="width:96px;height:96px;border-radius:50%;margin-top:-48px;flex-shrink:0"></div>
        <div style="padding-top:1rem;flex:1">
          <div class="skeleton skeleton-text" style="width:220px;height:1.75rem;margin-bottom:0.5rem"></div>
          <div class="skeleton skeleton-text short"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
        </div>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <h2 style="margin-bottom:1.5rem">Products by this Artisan</h2>
        <div class="product-grid" id="products-grid">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
        <div id="empty-products" class="empty-state" style="display:none">
          <div class="empty-icon">🏺</div>
          <h3>No products yet</h3>
          <p>This artisan hasn't listed any products yet.</p>
        </div>
      </div>
    </section>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/artisan-detail.js"></script>
</body>
</html>
