<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 160px);
      border: 2px solid var(--bone-dark);
      border-radius: var(--radius);
      overflow: hidden;
      background: white;
    }
    .convo-list { border-right: 1.5px solid var(--bone-dark); overflow-y: auto; display: flex; flex-direction: column; }
    .convo-list-header { padding: 1rem; font-weight: 700; font-family: 'Fraunces', serif; border-bottom: 1px solid var(--bone-dark); flex-shrink: 0; }
    .convo-item {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--bone-dark);
      cursor: pointer;
      transition: background 0.1s;
    }
    .convo-item:hover { background: var(--bone); }
    .convo-item.active { background: rgba(176,120,43,0.08); border-left: 3px solid var(--bronze); }
    .convo-item.unread .convo-name { font-weight: 700; }
    .convo-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.15rem; }
    .convo-preview { font-size: 0.78rem; color: var(--mud); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .convo-time { font-size: 0.72rem; color: #aaa; margin-top: 0.1rem; }
    .thread-panel { display: flex; flex-direction: column; }
    .thread-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--bone-dark); font-weight: 700; font-family: 'Fraunces', serif; display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .thread-messages { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg-bubble { max-width: 68%; }
    .msg-bubble.mine { align-self: flex-end; }
    .msg-bubble.theirs { align-self: flex-start; }
    .msg-body {
      padding: 0.625rem 0.875rem;
      border-radius: 12px;
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .mine .msg-body { background: var(--bronze); color: white; border-bottom-right-radius: 4px; }
    .theirs .msg-body { background: var(--bone); border-bottom-left-radius: 4px; }
    .msg-meta { font-size: 0.7rem; color: var(--mud); margin-top: 0.2rem; }
    .mine .msg-meta { text-align: right; }
    .thread-compose { border-top: 1.5px solid var(--bone-dark); padding: 0.75rem 1rem; display: flex; gap: 0.5rem; flex-shrink: 0; }
    .thread-compose textarea { flex: 1; resize: none; border: 1.5px solid var(--bone-dark); border-radius: var(--radius); padding: 0.5rem 0.75rem; font-family: 'Karla', sans-serif; font-size: 0.9rem; min-height: 44px; max-height: 120px; }
    .thread-compose textarea:focus { outline: none; border-color: var(--bronze); }
    .no-convo { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--mud); font-style: italic; }
    @media (max-width: 640px) { .messages-layout { grid-template-columns: 1fr; } .convo-list { height: 200px; } }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <div class="page-header">
    <div class="container">
      <h1>Messages</h1>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div class="messages-layout">
          <div class="convo-list">
            <div class="convo-list-header">Conversations</div>
            <div id="convo-list-body">
              <div style="padding:1rem;color:var(--mud);font-size:0.85rem">Loading…</div>
            </div>
          </div>
          <div class="thread-panel">
            <div class="thread-header" id="thread-title">Select a conversation</div>
            <div class="thread-messages" id="thread-messages">
              <div class="no-convo">Choose a conversation to start messaging</div>
            </div>
            <div class="thread-compose" id="thread-compose" style="display:none">
              <textarea id="compose-input" placeholder="Type a message…" rows="1"></textarea>
              <button class="btn btn-primary" id="send-btn">Send</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/messages.js"></script>
</body>
</html>
