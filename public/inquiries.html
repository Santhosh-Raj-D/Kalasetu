<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B2B Inquiries — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .inquiry-card {
      background: white;
      border: 2px solid var(--bone-dark);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .inquiry-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .inquiry-product { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; }
    .inquiry-meta { font-size: 0.8rem; color: var(--mud); margin-bottom: 0.5rem; }
    .inquiry-details { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
    .detail-box { background: var(--bone); border-radius: var(--radius); padding: 0.5rem 0.75rem; }
    .detail-box .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mud); }
    .detail-box .value { font-weight: 700; font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; color: var(--bronze); }
    .quote-section { background: #f0fdf4; border: 1px solid #6ee7b7; border-radius: var(--radius); padding: 1rem; margin-top: 0.75rem; }
    .quote-section h4 { color: #065f46; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <div class="page-header">
    <div class="container">
      <p class="breadcrumb"><a href="/">Home</a> › B2B Inquiries</p>
      <h1>B2B Inquiries</h1>
      <p style="opacity:0.8;margin-top:0.4rem">Bulk order inquiries and quotes from artisans</p>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div id="inquiries-content">
          <div class="skeleton" style="height:300px"></div>
        </div>
      </div>
    </section>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/inquiries.js"></script>
</body>
</html>
