<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .wishlist-card {
      background: white;
      border: 2px solid var(--mud);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .wishlist-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .wishlist-card-img { aspect-ratio: 4/3; overflow: hidden; background: var(--bone-dark); }
    .wishlist-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .wishlist-card-body { padding: 1rem; flex: 1; }
    .wishlist-card-footer { padding: 0.75rem 1rem; border-top: 1px solid var(--bone-dark); display: flex; gap: 0.5rem; }
    .wishlist-card-footer .btn { flex: 1; justify-content: center; }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <div class="page-header">
    <div class="container">
      <p class="breadcrumb"><a href="/">Home</a> › Wishlist</p>
      <h1>My Wishlist</h1>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div id="wishlist-count" style="margin-bottom:1rem;color:var(--mud);font-size:0.9rem"></div>
        <div class="product-grid" id="wishlist-grid">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>
    </section>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/wishlist.js"></script>
</body>
</html>
