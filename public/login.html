<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--indigo); padding: 2rem; }
    .auth-card { background: white; border-radius: 4px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .auth-logo { font-family: 'Fraunces', serif; font-size: 1.5rem; color: var(--bronze); text-align: center; margin-bottom: 0.25rem; }
    .auth-subtitle { text-align: center; color: var(--mud); font-size: 0.875rem; margin-bottom: 2rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--mud); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <p class="auth-logo">KalaSetu</p>
      <p class="auth-subtitle">Sign in to your account</p>

      <div id="error-msg" class="alert alert-error" style="display:none"></div>

      <form id="login-form" method="post" action="/api/auth/login">
        <div class="form-group">
          <label class="form-label" for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span class="req">*</span></label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submit-btn">Sign In</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="/register.html">Register</a></p>
      <p class="auth-footer" style="margin-top:0.5rem;font-size:0.75rem;color:#aaa">Demo: admin@kalasetu.in / Admin@123</p>
    </div>
  </div>

  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
