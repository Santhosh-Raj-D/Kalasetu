<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .success-hero { text-align: center; padding: 4rem 1.5rem 2rem; }
    .success-checkmark {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--leaf); color: white;
      font-size: 2.5rem; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; box-shadow: 0 0 0 12px rgba(92,124,76,0.12);
    }
    .success-hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .success-hero p { color: var(--mud); max-width: 480px; margin: 0 auto; }
    .order-number-box {
      display: inline-block; background: var(--bone); border: 1.5px solid var(--bone-dark);
      border-radius: var(--radius); padding: 0.5rem 1.5rem; font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem; font-weight: 600; color: var(--bronze); margin: 1.25rem 0;
    }
    .success-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
    .order-details-card { background: white; border: 2px solid var(--bone-dark); border-radius: var(--radius); padding: 1.5rem; max-width: 560px; margin: 2rem auto; }
    .order-detail-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.9rem; border-bottom: 1px solid var(--bone-dark); }
    .order-detail-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <main>
    <div class="success-hero">
      <div class="success-checkmark">✓</div>
      <h1>Order Placed Successfully!</h1>
      <p>Thank you for supporting tribal artisans. Your order is confirmed and will be processed shortly.</p>
      <div id="order-number-display"></div>
      <div class="success-actions">
        <a href="#order-details" class="btn btn-primary" id="view-order-btn">View Order Details</a>
        <a href="/shop.html" class="btn btn-secondary">Continue Shopping</a>
      </div>
    </div>

    <div id="order-details" class="container" style="margin-bottom:4rem">
      <div id="order-details-content">
        <div class="skeleton" style="height:200px;max-width:560px;margin:0 auto"></div>
      </div>
    </div>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/order-success.js"></script>
</body>
</html>
