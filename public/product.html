<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/product.css">
</head>
<body>
  <header class="site-header"></header>
  <main id="product-main">
    <div class="container" style="padding-top:2rem;padding-bottom:3rem" id="product-container">
      <div class="product-skeleton">
        <div class="skeleton" style="height:400px;border-radius:4px"></div>
        <div>
          <div class="skeleton skeleton-text" style="height:2rem;width:80%;margin-bottom:1rem"></div>
          <div class="skeleton skeleton-text" style="width:50%;margin-bottom:0.5rem"></div>
          <div class="skeleton skeleton-text" style="width:60%;margin-bottom:1rem"></div>
          <div class="skeleton skeleton-text" style="width:30%;height:1.5rem;margin-bottom:2rem"></div>
          <div class="skeleton" style="height:48px;border-radius:4px"></div>
        </div>
      </div>
    </div>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/product.js"></script>
</body>
</html>
