<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Tickets — KalaSetu Admin</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .admin-nav { background: #1a1210; padding: 0.75rem 0; border-bottom: 2px solid var(--bronze); }
    .admin-nav ul { list-style: none; display: flex; gap: 0.25rem; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; flex-wrap: wrap; }
    .admin-nav a { color: rgba(241,232,218,0.8); font-size: 0.875rem; padding: 0.35rem 0.75rem; border-radius: var(--radius); text-decoration: none; display: block; }
    .admin-nav a:hover, .admin-nav a.active { background: var(--bronze); color: var(--bone); }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <nav class="admin-nav">
    <ul>
      <li><a href="/admin/dashboard.html">Dashboard</a></li>
      <li><a href="/admin/users.html">Users</a></li>
      <li><a href="/admin/products.html">Products</a></li>
      <li><a href="/admin/transactions.html">Transactions</a></li>
      <li><a href="/admin/coupons.html">Coupons</a></li>
      <li><a href="/admin/tickets.html" class="active">Support Tickets</a></li>
      <li><a href="/admin/categories.html">Categories</a></li>
    </ul>
  </nav>
  <div class="page-header">
    <div class="container">
      <h1>Support Tickets</h1>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem">
          <select id="filter-status" style="padding:0.5rem 0.75rem;border:1.5px solid #c4b99a;border-radius:var(--radius);font-family:'Karla',sans-serif">
            <option value="">All Statuses</option>
            <option value="OPEN">Open</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="RESOLVED">Resolved</option>
            <option value="CLOSED">Closed</option>
          </select>
          <span id="ticket-count" style="align-self:center;font-size:0.85rem;color:var(--mud)"></span>
        </div>
        <div id="tickets-content"><div class="skeleton" style="height:300px"></div></div>
        <div id="pagination"></div>
      </div>
    </section>
  </main>

  <!-- Ticket Detail Modal -->
  <div class="modal-overlay hidden" id="ticket-detail-modal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h3 id="ticket-modal-title">Ticket Details</h3>
        <button class="modal-close" id="close-ticket-modal">×</button>
      </div>
      <div class="modal-body" id="ticket-modal-body">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="close-ticket-modal-btn">Close</button>
        <button class="btn btn-primary" id="save-ticket-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/admin-tickets.js"></script>
</body>
</html>
