<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — KalaSetu Admin</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .admin-nav { background: #1a1210; padding: 0.75rem 0; border-bottom: 2px solid var(--bronze); }
    .admin-nav ul { list-style: none; display: flex; gap: 0.25rem; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; flex-wrap: wrap; }
    .admin-nav a { color: rgba(241,232,218,0.8); font-size: 0.875rem; padding: 0.35rem 0.75rem; border-radius: var(--radius); text-decoration: none; display: block; }
    .admin-nav a:hover, .admin-nav a.active { background: var(--bronze); color: var(--bone); }
    .chip-admin { background: #fce7f3; color: #9d174d; }
    .chip-artisan { background: #ede9fe; color: #5b21b6; }
    .chip-customer { background: #dbeafe; color: #1e40af; }
    .chip-consultant { background: #d1fae5; color: #065f46; }
    .chip-active { background: #d1fae5; color: #065f46; }
    .chip-suspended { background: #fee2e2; color: #991b1b; }
    .chip-pending_verification { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <nav class="admin-nav">
    <ul>
      <li><a href="/admin/dashboard.html">Dashboard</a></li>
      <li><a href="/admin/users.html" class="active">Users</a></li>
      <li><a href="/admin/products.html">Products</a></li>
      <li><a href="/admin/transactions.html">Transactions</a></li>
      <li><a href="/admin/coupons.html">Coupons</a></li>
      <li><a href="/admin/tickets.html">Support Tickets</a></li>
      <li><a href="/admin/categories.html">Categories</a></li>
    </ul>
  </nav>
  <div class="page-header">
    <div class="container">
      <h1>Users</h1>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
            <input type="text" id="search-users" placeholder="Search name / email…" style="padding:0.5rem 0.75rem;border:1.5px solid #c4b99a;border-radius:var(--radius);font-family:'Karla',sans-serif;min-width:200px">
            <select id="filter-role" style="padding:0.5rem 0.75rem;border:1.5px solid #c4b99a;border-radius:var(--radius);font-family:'Karla',sans-serif">
              <option value="">All Roles</option>
              <option value="ADMIN">Admin</option>
              <option value="ARTISAN">Artisan</option>
              <option value="CUSTOMER">Customer</option>
              <option value="CONSULTANT">Consultant</option>
            </select>
            <select id="filter-status" style="padding:0.5rem 0.75rem;border:1.5px solid #c4b99a;border-radius:var(--radius);font-family:'Karla',sans-serif">
              <option value="">All Statuses</option>
              <option value="ACTIVE">Active</option>
              <option value="SUSPENDED">Suspended</option>
              <option value="PENDING_VERIFICATION">Pending</option>
            </select>
          </div>
          <button class="btn btn-primary" id="create-user-btn">+ Create User</button>
        </div>
        <div id="users-content"><div class="skeleton" style="height:300px"></div></div>
        <div id="pagination"></div>
      </div>
    </section>
  </main>

  <!-- Create User Modal -->
  <div class="modal-overlay hidden" id="create-user-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create New User</h3>
        <button class="modal-close" id="close-create-modal">×</button>
      </div>
      <div class="modal-body">
        <form id="create-user-form">
          <div class="form-group">
            <label class="form-label">Name <span class="req">*</span></label>
            <input class="form-control" name="name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email <span class="req">*</span></label>
            <input class="form-control" name="email" type="email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Role <span class="req">*</span></label>
            <select class="form-control" name="role" required>
              <option value="">Select role</option>
              <option value="CONSULTANT">Consultant</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Password <span class="req">*</span></label>
            <input class="form-control" name="password" type="password" required minlength="8">
          </div>
          <div id="create-user-error" class="alert alert-error" style="display:none"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-create-btn">Cancel</button>
        <button class="btn btn-primary" id="submit-create-btn">Create User</button>
      </div>
    </div>
  </div>

  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/admin-users.js"></script>
</body>
</html>
