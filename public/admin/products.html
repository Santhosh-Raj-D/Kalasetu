<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — KalaSetu Admin</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .admin-nav { background: #1a1210; padding: 0.75rem 0; border-bottom: 2px solid var(--bronze); }
    .admin-nav ul { list-style: none; display: flex; gap: 0.25rem; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; flex-wrap: wrap; }
    .admin-nav a { color: rgba(241,232,218,0.8); font-size: 0.875rem; padding: 0.35rem 0.75rem; border-radius: var(--radius); text-decoration: none; display: block; }
    .admin-nav a:hover, .admin-nav a.active { background: var(--bronze); color: var(--bone); }
    .featured-toggle { position: relative; display: inline-flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    .featured-toggle input { width: 36px; height: 20px; appearance: none; background: #ccc; border-radius: 10px; cursor: pointer; transition: background 0.2s; outline: none; }
    .featured-toggle input:checked { background: var(--bronze); }
    .featured-toggle input::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.2s; }
    .featured-toggle input:checked::after { left: 18px; }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <nav class="admin-nav">
    <ul>
      <li><a href="/admin/dashboard.html">Dashboard</a></li>
      <li><a href="/admin/users.html">Users</a></li>
      <li><a href="/admin/products.html" class="active">Products</a></li>
      <li><a href="/admin/transactions.html">Transactions</a></li>
      <li><a href="/admin/coupons.html">Coupons</a></li>
      <li><a href="/admin/tickets.html">Support Tickets</a></li>
      <li><a href="/admin/categories.html">Categories</a></li>
    </ul>
  </nav>
  <div class="page-header">
    <div class="container">
      <h1>Products Management</h1>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem">
          <input type="text" id="search-products" placeholder="Search products…" style="padding:0.5rem 0.75rem;border:1.5px solid #c4b99a;border-radius:var(--radius);font-family:'Karla',sans-serif;flex:1;min-width:180px">
          <select id="filter-status" style="padding:0.5rem 0.75rem;border:1.5px solid #c4b99a;border-radius:var(--radius);font-family:'Karla',sans-serif">
            <option value="">All Statuses</option>
            <option value="DRAFT">Draft</option>
            <option value="PENDING_REVIEW">Pending Review</option>
            <option value="APPROVED">Approved</option>
            <option value="REJECTED">Rejected</option>
            <option value="DELISTED">Delisted</option>
          </select>
          <span id="prod-count" style="align-self:center;font-size:0.85rem;color:var(--mud)"></span>
        </div>
        <div id="products-content"><div class="skeleton" style="height:300px"></div></div>
        <div id="pagination"></div>
      </div>
    </section>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/admin-products.js"></script>
</body>
</html>
