<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .admin-nav { background: #1a1210; padding: 0.75rem 0; border-bottom: 2px solid var(--bronze); }
    .admin-nav ul { list-style: none; display: flex; gap: 0.25rem; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; flex-wrap: wrap; }
    .admin-nav a { color: rgba(241,232,218,0.8); font-size: 0.875rem; padding: 0.35rem 0.75rem; border-radius: var(--radius); text-decoration: none; display: block; }
    .admin-nav a:hover, .admin-nav a.active { background: var(--bronze); color: var(--bone); }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    .chart-card { background: white; border: 2px solid var(--bone-dark); border-radius: var(--radius); padding: 1.5rem; }
    .chart-card h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mud); margin-bottom: 1rem; }
    @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="site-header"></header>
  <nav class="admin-nav">
    <ul>
      <li><a href="/admin/dashboard.html" class="active">Dashboard</a></li>
      <li><a href="/admin/users.html">Users</a></li>
      <li><a href="/admin/products.html">Products</a></li>
      <li><a href="/admin/transactions.html">Transactions</a></li>
      <li><a href="/admin/coupons.html">Coupons</a></li>
      <li><a href="/admin/tickets.html">Support Tickets</a></li>
      <li><a href="/admin/categories.html">Categories</a></li>
    </ul>
  </nav>
  <div class="page-header">
    <div class="container">
      <h1>Admin Dashboard</h1>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div class="stat-cards" id="kpi-cards">
          <div class="skeleton" style="height:90px"></div>
          <div class="skeleton" style="height:90px"></div>
          <div class="skeleton" style="height:90px"></div>
          <div class="skeleton" style="height:90px"></div>
        </div>
        <div class="chart-grid">
          <div class="chart-card">
            <h3>Orders per Day (Last 30 Days)</h3>
            <canvas id="orders-chart" height="200"></canvas>
          </div>
          <div class="chart-card">
            <h3>Revenue by Category</h3>
            <canvas id="categories-chart" height="200"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/admin-dashboard.js"></script>
</body>
</html>
