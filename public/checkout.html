<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — KalaSetu</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; align-items: start; }
    .checkout-card { background: white; border: 2px solid var(--bone-dark); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 1.5rem; }
    .checkout-card h2 { font-size: 1.1rem; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--bone-dark); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .order-summary-card { background: white; border: 2px solid var(--bone-dark); border-radius: var(--radius); padding: 1.5rem; position: sticky; top: 80px; }
    .order-summary-item { display: flex; gap: 0.75rem; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--bone-dark); }
    .order-summary-item:last-of-type { border-bottom: none; }
    .order-item-img { width: 56px; height: 56px; object-fit: cover; border-radius: var(--radius); background: var(--bone-dark); }
    .coupon-row { display: flex; gap: 0.5rem; }
    .coupon-row input { flex: 1; }
    .summary-totals { margin-top: 1rem; border-top: 1px solid var(--bone-dark); padding-top: 1rem; }
    .total-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.4rem; }
    .total-row.grand { font-weight: 700; font-size: 1.05rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--bone-dark); }
    .total-row .mono { font-family: 'IBM Plex Mono', monospace; }
    @media (max-width: 768px) { .checkout-layout { grid-template-columns: 1fr; } .order-summary-card { position: static; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="site-header"></header>
  <div class="page-header">
    <div class="container">
      <p class="breadcrumb"><a href="/cart.html">Cart</a> › Checkout</p>
      <h1>Checkout</h1>
    </div>
  </div>
  <main>
    <section class="section">
      <div class="container">
        <div id="checkout-content">
          <div class="skeleton" style="height:400px"></div>
        </div>
      </div>
    </section>
  </main>
  <div class="warli-frieze" aria-hidden="true"></div>
  <footer class="site-footer"></footer>
  <script type="module" src="/js/pages/checkout.js"></script>
</body>
</html>
